<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>TODO App</h1>
    <div class="input-row">
      <input id="todo-input" type="text" placeholder="What needs to be done?">
      <button id="add-btn">Add</button>
    </div>
    <ul id="todo-list">
      <li>
        <input type="checkbox"> <span>Buy groceries</span> <button class="delete-btn">✕</button>
      </li>
      <li class="completed">
        <input type="checkbox" checked> <span>Send project report</span> <button class="delete-btn">✕</button>
      </li>
      <li>
        <input type="checkbox"> <span>Call the dentist</span> <button class="delete-btn">✕</button>
      </li>
    </ul>
  </div>
</body>
</html>
