<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Todo App</h1>
    </header>
    <main>
      <div class="input-row">
        <input type="text" id="todo-input" placeholder="New todo…" aria-label="New todo">
        <button id="add-btn">Add</button>
      </div>
      <ul id="todo-list">
        <li>
          <input type="checkbox" id="item-1" aria-label="Buy groceries">
          <label for="item-1">Buy groceries</label>
          <button class="delete" aria-label="Delete Buy groceries">✕</button>
        </li>
        <li class="done">
          <input type="checkbox" id="item-2" checked aria-label="Write PRD">
          <label for="item-2">Write PRD</label>
          <button class="delete" aria-label="Delete Write PRD">✕</button>
        </li>
        <li>
          <input type="checkbox" id="item-3" aria-label="Book dentist">
          <label for="item-3">Book dentist</label>
          <button class="delete" aria-label="Delete Book dentist">✕</button>
        </li>
      </ul>
    </main>
  </div>
</body>
</html>
