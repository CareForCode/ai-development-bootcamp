name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: PLAYWRIGHT_BROWSERS_PATH=.playwright-mcp npx playwright install --with-deps chromium

      - name: Run unit tests
        run: npm run test

      - name: Run BDD tests
        run: npm run test:bdd


